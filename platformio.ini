[env:wt32-eth01]
; pioarduino: arduino-esp32 v3.x (ESP-IDF 5.x)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = wt32-eth01
framework = arduino
monitor_speed = 115200

; Ethernet settings for WT32-ETH01 V1.4
build_flags =
    -D ETH_PHY_ADDR=1
    -D ETH_PHY_TYPE=ETH_PHY_LAN8720
    -D ETH_PHY_POWER=16
    -D ETH_PHY_MDC=23
    -D ETH_PHY_MDIO=18
    -D ETH_CLK_MODE=ETH_CLOCK_GPIO0_IN

; OTA upload (uncomment and set IP when needed)
; upload_protocol = espota
; upload_port = 192.168.1.xxx

; Custom partition table: 1920KB per app slot (vs default 1280KB)
board_build.partitions = partitions.csv

; Disable WiFi and Bluetooth
build_unflags =
    -DBOARD_HAS_PSRAM
